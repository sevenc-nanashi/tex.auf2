#:schema ./.aviutl2-cli/aviutl2.schema.json

# 設定ファイルについては https://github.com/sevenc-nanashi/aviutl2-cli を参照してください。
[project]
id = "sevenc-nanashi.tex-auf2"
name = "tex.auf2"
version = "0.1.0"

[artifacts."tex.aux2"]
enabled = true
destination = "Plugin/tex.aux2"

[artifacts."tex.aux2".profiles.debug]
build = "cargo build"
source = "target/debug/tex_auf2.dll"
enabled = true

[artifacts."tex.aux2".profiles.release]
build = ["cargo build --release"]
source = "target/release/tex_auf2.dll"
enabled = true

[artifacts."English.aul2"]
enabled = false
source = "https://raw.githubusercontent.com/aviutl2/aviutl2_community_translation/refs/heads/main/locales/community_en.aul2"
destination = "Language/English.aul2"
profiles = { debug = { enabled = true } }

[artifacts."English.tex.aul2"]
source = "./i18n/English.tex.aul2"
destination = "Language/English.tex.aul2"

[development]
aviutl2_version = "latest"

[release]
prebuild = ["cargo about generate ./about.hbs -o ./release/package.txt"]
package_template = "./release/package.txt"
package_information = "{name} v{version} / SVGファイルを読み込むプラグイン"

[preview]

[catalog]
id = "sevenc-nanashi.tex-auf2"
download_repo = { owner = "sevenc-nanashi", repo = "tex.auf2" }
license_path = "./LICENSE"
